version: '3.8'

services:
  api:
    build:
      context: ./api
    ports:
      - "3001:3001"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - API_PORT=3001
      - DEFAULT_MODEL=${DEFAULT_MODEL:-claude-haiku-4-5-20251001}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/app/data
      - ./templates:/app/templates
    depends_on: []
    networks:
      - nexus

  dashboard:
    build:
      context: ./dashboard
    ports:
      - "3000:80"
    depends_on:
      - api
    networks:
      - nexus

networks:
  nexus:
    driver: bridge
